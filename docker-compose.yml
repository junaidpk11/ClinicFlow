services:
  postgres:
    image: postgres:16
    container_name: clinicflow-postgres
    environment:
      POSTGRES_DB: clinicflow
      POSTGRES_USER: clinicflow
      POSTGRES_PASSWORD: clinicflow
    ports:
      - "5432:5432"
    volumes:
      - clinicflow_pgdata:/var/lib/postgresql/data

volumes:
  clinicflow_pgdata:
