spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/clinicflow
    username: clinicflow
    password: clinicflow
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

server:
  port: 8080

clinicflow:
  jwt:
    secret: "change-me-in-production-must-be-at-least-32-chars-long"
    expiry-hours: 24
